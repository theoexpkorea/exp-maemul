<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#161A20">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" href="icon-192.png">
<title>매물 필터뷰</title>
<style>
  :root{
    --bg:#F4F5F7; --surface:#FFFFFF; --ink:#15181E; --muted:#727A86;
    --line:#E6E8EC; --line-2:#EEF0F3; --accent:#2746E6; --accent-soft:#EEF1FE;
    --sale:#1F7A4D; --sale-bg:#E7F4ED; --jeonse:#9A5B14; --jeonse-bg:#FBF1E2;
    --wolse:#2746E6; --wolse-bg:#EEF1FE; --chip:#F1F2F5;
    --shadow:0 1px 2px rgba(20,24,32,.04),0 6px 16px rgba(20,24,32,.06);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:"Pretendard","Pretendard Variable",-apple-system,"Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;
    background:var(--bg); color:var(--ink);
    font-feature-settings:"tnum" 1; -webkit-font-smoothing:antialiased;
  }
  .tnum{font-variant-numeric:tabular-nums}

  /* Header */
  header{
    position:sticky; top:0; z-index:30; background:var(--surface);
    border-bottom:1px solid var(--line);
    padding:calc(env(safe-area-inset-top) + 12px) 16px 0;
  }
  .head-row{display:flex; align-items:baseline; justify-content:space-between; gap:10px}
  .brand{display:flex; align-items:baseline; gap:8px}
  .brand .logo{font-size:21px; font-weight:800; letter-spacing:-.04em; margin:0; color:var(--ink); line-height:1}
  .brand .logo .o{color:var(--accent)}
  .brand .by{font-size:11px; color:var(--muted); font-weight:600; letter-spacing:.02em}
  .count{font-size:13px; color:var(--muted); font-weight:600}
  .count b{color:var(--accent); font-weight:800}

  .search{
    margin-top:12px; display:flex; align-items:center; gap:8px;
    background:var(--chip); border-radius:11px; padding:0 12px; height:42px;
  }
  .search svg{flex:none; opacity:.5}
  .search input{
    border:0; background:transparent; outline:0; width:100%; height:100%;
    font-size:15px; color:var(--ink); font-family:inherit;
  }
  .search input::placeholder{color:#9aa1ab}
  .search .clr{display:none; border:0;background:transparent;color:var(--muted);font-size:18px;padding:4px;cursor:pointer}

  /* type chips */
  .chips{display:flex; gap:7px; overflow-x:auto; padding:12px 16px 0; margin:0 -16px;
    scrollbar-width:none; -ms-overflow-style:none}
  .chips::-webkit-scrollbar{display:none}
  .chips:first-child{padding-left:16px}
  .chip{
    flex:none; border:1px solid var(--line); background:var(--surface);
    color:var(--muted); font-size:13.5px; font-weight:700; letter-spacing:-.01em;
    padding:7px 13px; border-radius:999px; cursor:pointer; transition:.12s;
  }
  .chip.on{background:var(--ink); color:#fff; border-color:var(--ink)}

  .toolbar{display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding:11px 16px; }
  .toolbar .filters{
    display:inline-flex; align-items:center; gap:6px; background:var(--surface);
    border:1px solid var(--line); border-radius:9px; height:34px; padding:0 12px;
    font-size:13px; font-weight:700; color:var(--ink); cursor:pointer;
  }
  .toolbar .filters .badge{background:var(--accent); color:#fff; font-size:11px;
    min-width:17px; height:17px; border-radius:9px; display:inline-flex; align-items:center;
    justify-content:center; padding:0 4px; font-weight:800}
  .sort{display:inline-flex; align-items:center; gap:4px; font-size:13px; font-weight:700;
    color:var(--muted); background:transparent; border:0; cursor:pointer; padding:6px}

  /* list */
  main{padding:0 12px calc(env(safe-area-inset-bottom) + 28px)}
  .card{
    background:var(--surface); border:1px solid var(--line); border-radius:14px;
    padding:14px 15px; margin:0 4px 11px; box-shadow:var(--shadow); cursor:pointer;
  }
  .card:active{transform:scale(.994)}
  .card-top{display:flex; align-items:center; gap:6px; margin-bottom:9px; flex-wrap:wrap}
  .tag{font-size:11.5px; font-weight:800; padding:3px 8px; border-radius:7px; letter-spacing:-.01em}
  .tag.t-type{background:#F0F1F4; color:#3B414C}
  .tag.t-deal.매매{background:var(--sale-bg); color:var(--sale)}
  .tag.t-deal.전세{background:var(--jeonse-bg); color:var(--jeonse)}
  .tag.t-deal.월세{background:var(--wolse-bg); color:var(--wolse)}
  .tag.t-deal.단기임대{background:#E9EDF5; color:#5A6B86}
  .id{font-size:12px; font-weight:700; color:#aab0ba}
  .idbox{margin-left:auto; text-align:right; line-height:1.2}
  .idbox .nv{display:block; font-size:10.5px; font-weight:600; color:#b8bdc6; margin-top:1px}
  .idbox .nv b{font-weight:700; color:#8b919b}
  .own{font-size:11px; font-weight:700; padding:2px 7px; border-radius:6px; border:1px solid transparent}
  .own.own-self{background:var(--ink); color:#fff; border-color:var(--ink)}
  .own.own-joint{background:var(--accent); color:#fff; border-color:var(--accent)}
  .own.own-other{background:#fff; color:var(--muted); border-color:var(--line)}

  .thumb{float:right; width:84px; height:84px; border-radius:9px; overflow:hidden; margin:0 0 8px 12px; background:#EEF0F3}
  .thumb img{width:100%; height:100%; object-fit:cover; display:block}
  .bldg{font-size:16.5px; font-weight:800; letter-spacing:-.02em; line-height:1.3; margin:0 0 3px;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden}
  .addr{font-size:12.5px; color:var(--muted); line-height:1.4; margin:0 0 11px;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden}

  .price{font-size:18px; font-weight:800; letter-spacing:-.02em; margin-bottom:10px}
  .price .lbl{font-size:12.5px; font-weight:700; color:var(--muted); margin-right:5px}
  .price .sep{color:var(--line); margin:0 7px; font-weight:600}
  .extras{display:flex; gap:16px; margin:-3px 0 10px; flex-wrap:wrap}
  .extras .ex{font-size:13.5px; font-weight:800; letter-spacing:-.01em}
  .extras .ek{font-size:11.5px; font-weight:700; color:var(--muted); margin-right:5px}

  .meta{display:flex; gap:0; border-top:1px solid var(--line-2); padding-top:10px; clear:both}
  .meta .m{flex:1; min-width:0}
  .meta .m + .m{border-left:1px solid var(--line-2); padding-left:12px}
  .meta .k{font-size:10.5px; color:#9aa1ab; font-weight:700; letter-spacing:.01em; margin-bottom:2px}
  .meta .v{font-size:13.5px; font-weight:800; letter-spacing:-.01em}

  .empty{text-align:center; padding:64px 24px; color:var(--muted)}
  .empty .em-t{font-size:15px; font-weight:700; color:var(--ink); margin-bottom:6px}
  .empty .em-s{font-size:13px}

  /* bottom sheet */
  .scrim{position:fixed; inset:0; background:rgba(15,18,24,.42); z-index:40; opacity:0;
    pointer-events:none; transition:.2s}
  .scrim.on{opacity:1; pointer-events:auto}
  .sheet{
    position:fixed; left:0; right:0; bottom:0; z-index:50; background:var(--surface);
    border-radius:20px 20px 0 0; transform:translateY(100%); transition:transform .26s cubic-bezier(.32,.72,0,1);
    max-height:86vh; display:flex; flex-direction:column; padding-bottom:env(safe-area-inset-bottom);
  }
  .sheet.on{transform:translateY(0)}
  .sheet-grip{width:38px; height:4px; background:#D9DCE1; border-radius:3px; margin:10px auto 4px}
  .sheet-head{display:flex; align-items:center; justify-content:space-between; padding:6px 18px 12px;
    border-bottom:1px solid var(--line)}
  .sheet-head h2{font-size:16px; font-weight:800; margin:0}
  .sheet-head .reset{font-size:13px; font-weight:700; color:var(--muted); background:0; border:0; cursor:pointer}
  .sheet-body{overflow-y:auto; padding:4px 18px 12px}
  .fgroup{padding:16px 0; border-bottom:1px solid var(--line-2)}
  .fgroup:last-child{border-bottom:0}
  .fgroup > .ft{font-size:13px; font-weight:800; margin-bottom:11px}
  .opts{display:flex; flex-wrap:wrap; gap:7px}
  .opt{border:1px solid var(--line); background:var(--surface); color:var(--muted);
    font-size:13.5px; font-weight:700; padding:8px 13px; border-radius:9px; cursor:pointer}
  .opt.on{background:var(--accent-soft); color:var(--accent); border-color:var(--accent)}
  .range{display:flex; align-items:center; gap:9px}
  .range input{width:100%; height:44px; border:1px solid var(--line); border-radius:10px;
    background:var(--bg); padding:0 12px; font-size:14px; font-family:inherit; text-align:right;
    font-variant-numeric:tabular-nums; outline:0; color:var(--ink)}
  .range input:focus{border-color:var(--accent); background:#fff}
  .range .dash{color:var(--muted); font-weight:700; flex:none}
  .range .unit{font-size:12px; color:var(--muted); font-weight:700; flex:none}
  .sheet-foot{padding:12px 18px calc(12px + env(safe-area-inset-bottom)); border-top:1px solid var(--line);
    background:var(--surface)}
  .apply{width:100%; height:52px; border:0; border-radius:13px; background:var(--ink); color:#fff;
    font-size:15.5px; font-weight:800; cursor:pointer; font-family:inherit}
  .apply:active{opacity:.9}

  /* sort menu */
  .sortmenu{position:fixed; z-index:50; background:var(--surface); border:1px solid var(--line);
    border-radius:13px; box-shadow:0 12px 30px rgba(20,24,32,.16); overflow:hidden; display:none;
    min-width:168px}
  .sortmenu.on{display:block}
  .sortmenu button{display:flex; align-items:center; justify-content:space-between; width:100%;
    background:0; border:0; padding:13px 15px; font-size:14px; font-weight:700; color:var(--ink);
    cursor:pointer; text-align:left; font-family:inherit}
  .sortmenu button + button{border-top:1px solid var(--line-2)}
  .sortmenu button.on{color:var(--accent)}

  /* ---- 비밀번호 화면 ---- */
  #lockScreen{
    position:fixed; inset:0; z-index:999;
    background:var(--bg);
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    padding:32px 24px;
    padding-top:calc(env(safe-area-inset-top) + 32px);
  }
  #lockScreen .lock-logo{
    font-size:28px; font-weight:800; letter-spacing:-.04em;
    margin-bottom:6px; color:var(--ink);
  }
  #lockScreen .lock-logo .o{color:var(--accent)}
  #lockScreen .lock-sub{
    font-size:13px; color:var(--muted); font-weight:600;
    margin-bottom:40px;
  }
  #lockScreen .lock-box{
    width:100%; max-width:320px;
    background:var(--surface); border-radius:18px;
    padding:28px 24px; box-shadow:var(--shadow);
    border:1px solid var(--line);
  }
  #lockScreen .lock-title{
    font-size:15px; font-weight:800; color:var(--ink);
    margin-bottom:16px; text-align:center;
  }
  #lockScreen .lock-input{
    width:100%; height:52px;
    border:1px solid var(--line); border-radius:12px;
    background:var(--bg); padding:0 16px;
    font-size:20px; font-family:inherit;
    text-align:center; letter-spacing:6px;
    outline:0; color:var(--ink);
    font-variant-numeric:tabular-nums;
    margin-bottom:12px;
  }
  #lockScreen .lock-input:focus{border-color:var(--accent); background:#fff}
  #lockScreen .lock-btn{
    width:100%; height:52px; border:0; border-radius:13px;
    background:var(--ink); color:#fff;
    font-size:15.5px; font-weight:800; cursor:pointer;
    font-family:inherit; transition:.12s;
  }
  #lockScreen .lock-btn:active{opacity:.85}
  #lockScreen .lock-err{
    font-size:13px; font-weight:700; color:#E03A3A;
    text-align:center; margin-top:10px;
    min-height:20px;
  }
</style>
</head>
<body>

<!-- 비밀번호 잠금 화면 -->
<div id="lockScreen">
  <div class="lock-logo">the<span class="o">o</span></div>
  <div class="lock-sub">내부 관리 시스템</div>
  <div class="lock-box">
    <div class="lock-title">🔒 비밀번호를 입력하세요</div>
    <input id="lockInput" class="lock-input" type="password"
      inputmode="numeric" maxlength="8" placeholder="••••"
      autocomplete="off" autocorrect="off" spellcheck="false">
    <button class="lock-btn" id="lockBtn">확인</button>
    <div class="lock-err" id="lockErr"></div>
  </div>
</div>

<header>
  <div class="head-row">
    <div class="brand">
      <span class="logo">the<span class="o">o</span></span>
      <span class="by" id="appBy">매물 필터뷰</span>
    </div>
    <div class="count"><b id="cnt">0</b>건</div>
  </div>
  <div class="search">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
    <input id="q" placeholder="건물명 · 주소 · 매물번호 · 네이버번호" autocomplete="off">
    <button class="clr" id="clr">×</button>
  </div>
  <div class="chips" id="typechips"></div>
  <div class="toolbar">
    <button class="filters" id="openFilters">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M3 5h18M6 12h12M10 19h4"/></svg>
      필터 <span class="badge" id="fbadge" style="display:none">0</span>
    </button>
    <button class="sort" id="openSort">
      <span id="sortLabel">매물번호순</span>
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="m6 9 6 6 6-6"/></svg>
    </button>
  </div>
</header>

<main id="list"></main>

<div class="scrim" id="scrim"></div>

<div class="sheet" id="sheet">
  <div class="sheet-grip"></div>
  <div class="sheet-head">
    <h2>상세 필터</h2>
    <button class="reset" id="resetAll">초기화</button>
  </div>
  <div class="sheet-body">
    <div class="fgroup">
      <div class="ft">거래구분</div>
      <div class="opts" id="dealOpts"></div>
    </div>
    <div class="fgroup">
      <div class="ft">시도</div>
      <div class="opts" id="sidoOpts"></div>
    </div>
    <div class="fgroup">
      <div class="ft">시군구</div>
      <div class="opts" id="sgOpts"></div>
    </div>
    <div class="fgroup">
      <div class="ft">실측면적 (평)</div>
      <div class="range">
        <input id="pyMin" inputmode="numeric" placeholder="최소"><span class="dash">–</span>
        <input id="pyMax" inputmode="numeric" placeholder="최대"><span class="unit">평</span>
      </div>
    </div>
    <div class="fgroup">
      <div class="ft">매매가 (만원)</div>
      <div class="range">
        <input id="saleMin" inputmode="numeric" placeholder="최소"><span class="dash">–</span>
        <input id="saleMax" inputmode="numeric" placeholder="최대"><span class="unit">만원</span>
      </div>
    </div>
    <div class="fgroup">
      <div class="ft">보증금 (만원)</div>
      <div class="range">
        <input id="depMin" inputmode="numeric" placeholder="최소"><span class="dash">–</span>
        <input id="depMax" inputmode="numeric" placeholder="최대"><span class="unit">만원</span>
      </div>
    </div>
    <div class="fgroup">
      <div class="ft">월세 (만원)</div>
      <div class="range">
        <input id="rentMin" inputmode="numeric" placeholder="최소"><span class="dash">–</span>
        <input id="rentMax" inputmode="numeric" placeholder="최대"><span class="unit">만원</span>
      </div>
    </div>
    <div class="fgroup">
      <div class="ft">임대료+관리비 평단가 (원)</div>
      <div class="range">
        <input id="unitMin" inputmode="numeric" placeholder="최소"><span class="dash">–</span>
        <input id="unitMax" inputmode="numeric" placeholder="최대"><span class="unit">원</span>
      </div>
    </div>
    <div class="fgroup">
      <div class="ft">권리금 (만원)</div>
      <div class="range">
        <input id="premMin" inputmode="numeric" placeholder="최소"><span class="dash">–</span>
        <input id="premMax" inputmode="numeric" placeholder="최대"><span class="unit">만원</span>
      </div>
    </div>
  </div>
  <div class="sheet-foot">
    <button class="apply" id="applyBtn">매물 보기</button>
  </div>
</div>

<div class="sortmenu" id="sortmenu"></div>

<script>
/* ===================== 설정 (CONFIG) =====================
   여기 두 줄만 바꾸면 됨.
   MODE     : "internal" = 내부용(전체·매물번호·자기/타부동산 표시)
              "client"   = 고객용(민감정보 숨김)
   DATA_URL : null  = 아래 박혀있는 데이터 사용 (1단계: 정적/수동갱신)
              "주소" = 구글시트 게시 JSON / Apps Script URL 넣으면 라이브 (2단계)
   ※ 고객용 배포 시에는 DATA_URL/embedded 데이터 자체에서 내부필드를 빼서 내보낼 것.
   ======================================================== */
const CONFIG = {
  MODE:"internal",
  // ↓ Apps Script 배포 후 나온 .../exec 주소를 여기 붙여넣으면 라이브 전환.
  //   null로 두면 아래 박힌 데이터 사용(오프라인 폴백).
  DATA_URL:"https://script.google.com/macros/s/AKfycbyAm0Rg1UpdvE62YEvc_0ex2UO9wEG-Jk7QsSOP8eKFZzILH8NKWSsh2NSJvS_tHDaS/exec",
  TITLE:null,
  // ↓ 비밀번호: 여기서 직접 바꾸거나, PASS_URL에 Apps Script 주소 넣으면 시트에서 관리 가능
  //   PASS_URL이 있으면 시트 비번 우선, 없으면 PASS 사용
  PASS:"1234",
  PASS_URL:null   // 예: "https://script.google.com/.../exec?mode=pass"

/* ---- 금액 포맷: 만원 → 억/만원 ---- */
function won(manwon){
  if(manwon==null || manwon==="-" || manwon===0) return "-";
  const n = Math.round(manwon);
  const eok = Math.floor(n/10000), man = n%10000;
  if(eok>0 && man>0) return `${eok}억 ${man.toLocaleString()}만`;
  if(eok>0) return `${eok}억`;
  return `${man.toLocaleString()}만`;
}
function priceLine(d){
  if(d.deal==="매매") return `<span class="lbl">매매</span>${won(d.sale)}`;
  if(d.deal==="전세") return `<span class="lbl">전세</span>${won(d.deposit)}`;
  // 월세
  let s = `<span class="lbl">보증</span>${won(d.deposit)}<span class="sep">/</span><span class="lbl">월</span>${won(d.rent)}`;
  return s;
}
function unitTxt(u){ return (u==null||u==="-") ? "-" : Math.round(u).toLocaleString()+"원"; }
function fnum(v,dec){ if(v==null||v==="-"||v===""||isNaN(+v)) return v; return (+(+v).toFixed(dec)).toLocaleString(); }
function extrasLine(d){
  const bits=[];
  const isNA=v=>(v==null || v==="" || v==="-");
  // 권리금/관리비: 0이면 "없음", 빈칸이면 숨김
  const cell=(label,v)=>{
    if(isNA(v)) return null;
    const n=Number(v); if(isNaN(n)) return null;
    return `<span class="ex"><span class="ek">${label}</span>${n>0?won(v):"없음"}</span>`;
  };
  // 보증/월세: 값이 0보다 클 때만 (매매 부가용)
  const pos=(label,v)=>{
    if(isNA(v)) return null;
    const n=Number(v); if(isNaN(n)||n<=0) return null;
    return `<span class="ex"><span class="ek">${label}</span>${won(v)}</span>`;
  };
  // 매매인데 임대(보증/월세) 정보가 있으면 부가로 표시 (수익형 매매 등)
  if(d.deal==="매매"){
    const dep=pos("보증",d.deposit); if(dep) bits.push(dep);
    const rt =pos("월",d.rent);      if(rt)  bits.push(rt);
  }
  const p=cell("권리금",d.premium); if(p) bits.push(p);
  const m=cell("관리비",d.mgmt);    if(m) bits.push(m);
  return bits.length ? `<div class="extras tnum">${bits.join("")}</div>` : "";
}
const num = v => (v===""||v==null)?null:(isNaN(+v)?null:+v);
function naverLine(d){
  const v=d.naver;
  if(v==null || v==="" || String(v).trim()==="-") return "";
  return `<span class="nv">네이버 <b>${v}</b></span>`;
}

/* ---- 필터 적용 ---- */
function filtered(){
  let r = DATA.filter(d=>{
    if(state.type!=="전체" && d.type!==state.type) return false;
    if(state.deals.size && !state.deals.has(d.deal)) return false;
    if(state.sidos.size && !state.sidos.has(d.sido)) return false;
    if(state.sgs.size && !state.sgs.has(d.sigungu)) return false;
    if(state.pyMin!=null && d.pyeong<state.pyMin) return false;
    if(state.pyMax!=null && d.pyeong>state.pyMax) return false;
    if(state.saleMin!=null && d.sale<state.saleMin) return false;
    if(state.saleMax!=null && d.sale>state.saleMax) return false;
    if(state.depMin!=null && d.deposit<state.depMin) return false;
    if(state.depMax!=null && d.deposit>state.depMax) return false;
    if(state.rentMin!=null && d.rent<state.rentMin) return false;
    if(state.rentMax!=null && d.rent>state.rentMax) return false;
    const u = (d.unit==="-"||d.unit==null)?null:d.unit;
    if(state.unitMin!=null && (u==null||u<state.unitMin)) return false;
    if(state.unitMax!=null && (u==null||u>state.unitMax)) return false;
    const pm = (d.premium==null||d.premium==="-")?null:d.premium;
    if(state.premMin!=null && (pm==null||pm<state.premMin)) return false;
    if(state.premMax!=null && (pm==null||pm>state.premMax)) return false;
    if(state.q){
      const q=state.q.toLowerCase();
      const hay=`${d.bldg} ${d.addr} ${d.id} ${d.naver} ${d.dong} ${d.sigungu}`.toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });
  const s=state.sort;
  const uu = x => (x.unit==="-"||x.unit==null)?Infinity:x.unit;
  // 값 없으면(null/"-"/0아님) 항상 뒤로 가게: asc는 +Inf, desc는 -Inf
  const gv = (x,key,dir) => {
    const v = x[key];
    if(v==null || v==="" || v==="-" || isNaN(+v)) return dir==="asc"?Infinity:-Infinity;
    return +v;
  };
  r.sort((a,b)=>{
    if(s==="id_asc")  return String(a.id||"").localeCompare(String(b.id||""), undefined, {numeric:true});
    if(s==="py_desc") return b.pyeong-a.pyeong;
    if(s==="py_asc")  return a.pyeong-b.pyeong;
    if(s==="unit_asc")return uu(a)-uu(b);
    if(s==="unit_desc")return uu(b)-uu(a);
    if(s==="sale_asc") return gv(a,"sale","asc")-gv(b,"sale","asc");
    if(s==="sale_desc")return gv(b,"sale","desc")-gv(a,"sale","desc");
    if(s==="dep_asc") return a.deposit-b.deposit;
    if(s==="dep_desc")return b.deposit-a.deposit;
    if(s==="rent_asc") return gv(a,"rent","asc")-gv(b,"rent","asc");
    if(s==="rent_desc")return gv(b,"rent","desc")-gv(a,"rent","desc");
    if(s==="mgmt_asc") return gv(a,"mgmt","asc")-gv(b,"mgmt","asc");
    if(s==="mgmt_desc")return gv(b,"mgmt","desc")-gv(a,"mgmt","desc");
    if(s==="prem_asc") return gv(a,"premium","asc")-gv(b,"premium","asc");
    if(s==="prem_desc")return gv(b,"premium","desc")-gv(a,"premium","desc");
    return 0;
  });
  return r;
}

      <div class="meta">
        <div class="m"><div class="k">실측면적</div><div class="v tnum">${fnum(d.pyeong,1)}평</div></div>
        <div class="m"><div class="k">전용 ㎡</div><div class="v tnum">${fnum(d.m2,1)}㎡</div></div>
        <div class="m"><div class="k">평단가</div><div class="v tnum">${unitTxt(d.unit)}</div></div>
      </div>
    </div>`).join("");
  // 필터 뱃지
  let active = state.deals.size+state.sidos.size+state.sgs.size +
    [state.pyMin,state.pyMax,state.saleMin,state.saleMax,state.depMin,state.depMax,state.rentMin,state.rentMax,state.unitMin,state.unitMax,state.premMin,state.premMax].filter(x=>x!=null).length;
  const b=document.getElementById("fbadge");
  if(active){b.style.display="inline-flex"; b.textContent=active;} else b.style.display="none";
}

/* ---- 타입 칩 ---- */
const tc=document.getElementById("typechips");
tc.innerHTML=TYPES.map(t=>`<button class="chip ${t===state.type?'on':''}" data-t="${t}">${t}</button>`).join("");
function applyChipStyles(){
  [...tc.children].forEach(c=>{
    const t=c.dataset.t, on=(t===state.type);
    c.classList.toggle("on", on);
    if(on && t!=="전체" && TYPE_COLOR[t]){
      c.style.background=TYPE_COLOR[t][1]; c.style.color="#fff"; c.style.borderColor=TYPE_COLOR[t][1];
    } else {
      c.style.background=""; c.style.color=""; c.style.borderColor="";
    }
  });
}
applyChipStyles();
tc.addEventListener("click",e=>{
  const btn=e.target.closest(".chip"); if(!btn)return;
  state.type=btn.dataset.t;
  applyChipStyles();
  render();
});

/* ---- 검색 ---- */
const qEl=document.getElementById("q"), clr=document.getElementById("clr");
qEl.addEventListener("input",()=>{state.q=qEl.value.trim(); clr.style.display=qEl.value?"block":"none"; render();});
clr.addEventListener("click",()=>{qEl.value="";state.q="";clr.style.display="none";render();qEl.focus();});

/* ---- 옵션 빌드 ---- */
function chipset(elId, values, set){
  const el=document.getElementById(elId);
  el.innerHTML=values.map(v=>`<button class="opt" data-v="${v}">${v}</button>`).join("");
  el.addEventListener("click",e=>{
    const o=e.target.closest(".opt"); if(!o)return;
    const v=o.dataset.v;
    if(set.has(v)) set.delete(v); else set.add(v);
    o.classList.toggle("on", set.has(v));
    if(elId==="sidoOpts") rebuildSG();
  });
}
const uniq=(k)=>[...new Set(DATA.map(d=>d[k]))];
function rebuildSG(){
  const pool = state.sidos.size ? DATA.filter(d=>state.sidos.has(d.sido)) : DATA;
  const vals=[...new Set(pool.map(d=>d.sigungu))];
  for(const v of [...state.sgs]) if(!vals.includes(v)) state.sgs.delete(v);
  const el=document.getElementById("sgOpts");
  el.innerHTML=vals.map(v=>`<button class="opt ${state.sgs.has(v)?'on':''}" data-v="${v}">${v}</button>`).join("");
}
document.getElementById("sgOpts").addEventListener("click",e=>{
  const o=e.target.closest(".opt"); if(!o)return;
  const v=o.dataset.v;
  if(state.sgs.has(v)) state.sgs.delete(v); else state.sgs.add(v);
  o.classList.toggle("on", state.sgs.has(v));
});

/* ---- 바텀시트 ---- */
const sheet=document.getElementById("sheet"), scrim=document.getElementById("scrim");
function openSheet(){ syncInputs(); sheet.classList.add("on"); scrim.classList.add("on"); }
function closeSheet(){ sheet.classList.remove("on"); scrim.classList.remove("on"); }
document.getElementById("openFilters").addEventListener("click",openSheet);
scrim.addEventListener("click",()=>{closeSheet(); closeSort();});
function syncInputs(){
  const m={pyMin:"pyMin",pyMax:"pyMax",saleMin:"saleMin",saleMax:"saleMax",depMin:"depMin",depMax:"depMax",rentMin:"rentMin",rentMax:"rentMax",unitMin:"unitMin",unitMax:"unitMax",premMin:"premMin",premMax:"premMax"};
  for(const k in m) document.getElementById(m[k]).value = state[k]==null?"":state[k];
}
function pullInputs(){
  state.pyMin=num(pyMin.value); state.pyMax=num(pyMax.value);
  state.saleMin=num(saleMin.value); state.saleMax=num(saleMax.value);
  state.depMin=num(depMin.value); state.depMax=num(depMax.value);
  state.rentMin=num(rentMin.value); state.rentMax=num(rentMax.value);
  state.unitMin=num(unitMin.value); state.unitMax=num(unitMax.value);
  state.premMin=num(premMin.value); state.premMax=num(premMax.value);
}
document.getElementById("applyBtn").addEventListener("click",()=>{pullInputs(); render(); closeSheet();});
document.getElementById("resetAll").addEventListener("click",()=>{
  state.deals.clear(); state.sidos.clear(); state.sgs.clear();
  ["pyMin","pyMax","saleMin","saleMax","depMin","depMax","rentMin","rentMax","unitMin","unitMax","premMin","premMax"].forEach(k=>state[k]=null);
  document.querySelectorAll(".opt.on").forEach(o=>o.classList.remove("on"));
  rebuildSG(); syncInputs(); render();
});

/* ---- 정렬 메뉴 ---- */
const sortmenu=document.getElementById("sortmenu");
sortmenu.innerHTML=SORTS.map(s=>`<button data-k="${s.k}" class="${s.k===state.sort?'on':''}">${s.label}${s.k===state.sort?' ✓':''}</button>`).join("");
function openSort(){
  const btn=document.getElementById("openSort").getBoundingClientRect();
  sortmenu.style.top=(btn.bottom+6)+"px";
  sortmenu.style.right=(window.innerWidth-btn.right)+"px";
  sortmenu.classList.add("on"); scrim.classList.add("on");
}
function closeSort(){ sortmenu.classList.remove("on"); if(!sheet.classList.contains("on")) scrim.classList.remove("on"); }
document.getElementById("openSort").addEventListener("click",e=>{e.stopPropagation(); openSort();});
sortmenu.addEventListener("click",e=>{
  const b=e.target.closest("button"); if(!b)return;
  state.sort=b.dataset.k;
  document.getElementById("sortLabel").textContent=SORTS.find(s=>s.k===state.sort).label;
  sortmenu.innerHTML=SORTS.map(s=>`<button data-k="${s.k}" class="${s.k===state.sort?'on':''}">${s.label}${s.k===state.sort?' ✓':''}</button>`).join("");
  closeSort();
  render();
});

function applyMode(){
  const isClient = CONFIG.MODE==="client";
  document.getElementById("appBy").textContent = CONFIG.TITLE || (isClient ? "추천 매물 · eXp" : "매물 필터뷰 · eXp");
}
function loadLive(base){
  // Apps Script 웹앱은 CORS 이슈가 있어 JSONP(script 태그)로 읽음
  return new Promise(function(resolve, reject){
    var cb = "__maemul_cb_" + Date.now();
    var s = document.createElement("script");
    var done = false;
    window[cb] = function(data){ done=true; cleanup(); resolve(data); };
    function cleanup(){ try{delete window[cb];}catch(e){window[cb]=undefined;} if(s.parentNode) s.parentNode.removeChild(s); }
    s.onerror = function(){ if(!done){ cleanup(); reject(new Error("load fail")); } };
    var sep = base.indexOf("?")>=0 ? "&" : "?";
    s.src = base + sep + "callback=" + cb + (CONFIG.MODE==="client" ? "&mode=client" : "");
    document.head.appendChild(s);
    setTimeout(function(){ if(!done){ cleanup(); reject(new Error("timeout")); } }, 12000);
  });
}
async function boot(){
  applyMode();
  if(CONFIG.DATA_URL){
    try{
      const j = await loadLive(CONFIG.DATA_URL);
      if(Array.isArray(j) && j.length) DATA = j;   // 라이브 데이터로 교체
    }catch(e){ console.error("라이브 데이터 로드 실패 → 내장 데이터 사용:", e); }
  }
  chipset("dealOpts", ["매매","전세","월세","단기임대"], state.deals);
  chipset("sidoOpts", uniq("sido"), state.sidos);
  rebuildSG();
  render();
}
/* ---- 비밀번호 잠금 ---- */
(function(){
  const lockScreen = document.getElementById("lockScreen");
  const lockInput  = document.getElementById("lockInput");
  const lockBtn    = document.getElementById("lockBtn");
  const lockErr    = document.getElementById("lockErr");

  let correctPass = CONFIG.PASS;

  function unlock(){
    lockScreen.style.display = "none";
  }

  function tryUnlock(){
    const entered = lockInput.value.trim();
    if(!entered){ lockErr.textContent = "비밀번호를 입력해 주세요"; return; }
    if(entered === correctPass){
      unlock();
    } else {
      lockErr.textContent = "비밀번호가 틀렸습니다";
      lockInput.value = "";
      lockInput.focus();
      // 흔들기 효과
      lockInput.style.borderColor = "#E03A3A";
      setTimeout(()=>{ lockInput.style.borderColor = ""; }, 800);
    }
  }

  lockBtn.addEventListener("click", tryUnlock);
  lockInput.addEventListener("keydown", e=>{ if(e.key==="Enter") tryUnlock(); });
  lockInput.focus();

  // PASS_URL 있으면 시트에서 비번 가져오기
  if(CONFIG.PASS_URL){
    var cb = "__pass_cb_" + Date.now();
    var s  = document.createElement("script");
    window[cb] = function(data){
      try{ delete window[cb]; }catch(e){}
      if(s.parentNode) s.parentNode.removeChild(s);
      if(data && data.pass) correctPass = String(data.pass);
    };
    s.onerror = function(){ try{delete window[cb];}catch(e){} if(s.parentNode) s.parentNode.removeChild(s); };
    var sep = CONFIG.PASS_URL.indexOf("?")>=0 ? "&" : "?";
    s.src = CONFIG.PASS_URL + sep + "callback=" + cb;
    document.head.appendChild(s);
  }
})();

boot();
</script>
